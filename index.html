<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaBull/Landingpage-creation</title>

    <!-- Pre-fetch the data from the worker in parallel with React scripts to save 500ms -->
    <script>
      (function() {
        var workerUrl = "%VITE_WORKER_URL%";
        var path = window.location.pathname.replace(/^\/+/, '').split('/')[0];
        var reserved = ["auth", "dashboard", "admin", "create", "edit", "recycle-bin"];

        var nhostProject = "%VITE_NHOST_SUBDOMAIN%";

        if (path && !reserved.includes(path) && workerUrl && workerUrl !== "%VITE_WORKER_URL%") {
          window.__INITIAL_DATA_PROMISE__ = new Promise(function(resolve, reject) {
            var xhr = new XMLHttpRequest();
            var requestUrl = workerUrl + "?slug=" + encodeURIComponent(path) + "&format=json";
            if (nhostProject && nhostProject !== "%VITE_NHOST_SUBDOMAIN%") {
              requestUrl += "&project=" + encodeURIComponent(nhostProject);
            }
            xhr.open("GET", requestUrl, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
              if (xhr.readyState === 4) {
                if (xhr.status >= 200 && xhr.status < 300) {
                  try {
                    var data = JSON.parse(xhr.responseText);
                    window.__INITIAL_DATA__ = data;
                    resolve(data);
                  } catch (e) {
                    reject("Parse error");
                  }
                } else {
                  reject(xhr.status);
                }
              }
            };
            xhr.onerror = function() { reject("Network error"); };
            xhr.send();
          }).catch(function(err) {
            console.error("Prefetch error", err);
            return null;
          });
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
